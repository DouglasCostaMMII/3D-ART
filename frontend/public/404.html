<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>3D Atelie - Impressões</title>
    <script>
      // SPA redirect for GitHub Pages
      var l = window.location;
      var isGithubPages = l.hostname.endsWith('.github.io');
      var base = isGithubPages ? l.pathname.split('/').slice(0, 2).join('/') : '';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base + '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? l.search : '') + l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
