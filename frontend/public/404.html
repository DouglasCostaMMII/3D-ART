<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>3D Atelie - Impressões</title>
    <script>
      // SPA redirect for GitHub Pages
      // Converts the path to a query param so index.html can restore it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? l.search : '') + l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
